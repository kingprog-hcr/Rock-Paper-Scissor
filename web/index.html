<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre - Papier - Ciseaux</title>
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Polices Google Fonts (Poppins & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="game-card">
        <header class="header">
            <h1>Pierre - Papier - Ciseaux</h1>
            <span class="subtitle-badge"><i class="fa-solid fa-trophy"></i> Premier à 5 points gagne</span>
        </header>

        <!-- Section des Scores -->
        <section id="scores">
            <div class="score-card player">
                <span class="score-label">Vous</span>
                <span id="user-score" class="score-value">0</span>
            </div>
            
            <div class="score-divider">VS</div>

            <div class="score-card computer">
                <span class="score-label">Ordinateur</span>
                <span id="computer-score" class="score-value">0</span>
            </div>
        </section>

        <!-- Zone d'Information dynamique -->
        <section id="info" class="info-box">
            <p id="round" class="round-title">Prêt ?</p>
            <p id="choices" class="choices-text">Cliquez sur une option pour commencer la partie.</p>
            <p id="result" class="result-text"></p>
        </section>

        <!-- Choix des coups -->
        <section id="choix"> 
            <p class="section-title">Faites votre choix</p>
            <div class="btn-group">
                <button id="rock" class="btn-choice">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-hand-back-fist"></i>
                    </div>
                    <span>Pierre</span>
                </button>

                <button id="paper" class="btn-choice">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-hand"></i>
                    </div>
                    <span>Feuille</span>
                </button>

                <button id="cissor" class="btn-choice">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-scissors"></i>
                    </div>
                    <span>Ciseaux</span>
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
